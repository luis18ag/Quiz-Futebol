<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fim do Quiz</title>
    <link rel="stylesheet" href="indexStyle.css">
   
</head>
<body>
    <div class="container">
    
    <h1>Quiz Finalizado!</h1>
    <h3 id="resp"></h3>
    <p>Obrigado por participar do quiz sobre futebol.</p>   
    <button onclick="window.location.href='index.html'">Reiniciar Quiz</button>
    </div>
     <script>
        var acertos = sessionStorage.getItem("acertos") ;
        document.getElementById("resp").innerText = "Você acertou " + acertos + " de 15 perguntas!";
        sessionStorage.clear(); 
    </script>
</body>
</html>
