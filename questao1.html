<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Questão 1</title>
<link rel="stylesheet" href="questoesstyle.css" />
<script>
     var acertos = 0;
     var tempo = 0;
    function quiz(num){
        switch(num){
          case "3":
            alert("Resposta correta!");
              acertos += 1;
             sessionStorage.setItem("acertos", acertos);
            break;
            default:
            alert("Resposta incorreta!");
           
        }
       
        window.location.href='questao2.html';
    }

    function formatarTempo(tempo) {
        let horas = Math.floor(tempo / 3600);
        let minutos = Math.floor((tempo % 3600) / 60);
        let segundos = tempo % 60;
        return `${horas.toString().padStart(2, '0')}:${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')}`;
        }

        function Cronometro() {
          tempo++;
          document.getElementById("cronometro").innerText = formatarTempo(tempo);
            if(tempo>=61){
            alert("O tempo acabou!"); 
            tempo = 0;
             sessionStorage.setItem("acertos", acertos);
            window.location.href = 'questao2.html';
        }

        }
        setInterval(Cronometro, 1000);

   
      
</script>
</head>
<body>
  
  <table>
    <tr>
      <td colspan="2"><h1>Questão 1</h1></td>
    </tr>
    <tr>
        <td colspan="2"><p>Qual país venceu a primeira Copa do Mundo da FIFA (1930)?</p></td>
    </tr>
    <tr>
      
      <td id="1" onclick="quiz('1')">A) Brasil</td>
      <td id="2" onclick="quiz('2')">B) Alemanha</td>
    </tr>
    <tr>
      <td id="3" onclick="quiz('3')">C) Uruguai</td>
      <td id="4" onclick="quiz('4')">D) Itália</td>
    </tr>
    <tr>
      <td colspan="2">
        <p id="cronometro">00:00:00</p>
      </td>
    </tr>
  </table>
</body>
</html>
